<html>

<head>
  <title>SpringBoy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0;
      min-height: 100vh;
      background-color: #000000;
    }

    .content {
      display: inline-block;
      max-width: 100%;
    }

    img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin-bottom: 0;
    }

    textarea {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 0;
    }
  </style>
</head>

<body>
  <div class="content">
    <img src="assets/vacay volley v1 0_1.png">
    <textarea name="keeb" id="keeb" placeholder="type here..." autofocus></textarea>
  </div>
</body>

</html>
